<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Personality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body  id="body">

<div class="container">

    <h1>Check Health</h1>

    <input type="number" id="weight" placeholder="Enter Weight (kg)">

    <input type="number" id="height" placeholder="Enter Height (cm)">
    
    <input type="number" id="age" placeholder="Enter age">

    <progress id="meter" value="0" max="40"></progress>

    <select id="gender" class="select">
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>

    <button onclick="checkHealth()">checkHealth</button>
    <button onclick="resetData()">resetData</button>
    <button onclick="darkMode()">darkMode</button>

    <h2 id="result">result</h2>
    <p id="suggestion"></p>

</div>

    <script>
    function resetData(){
                document.getElementById("weight").value = "";
                document.getElementById("height").value = "";
                document.getElementById("age").value = "";
                document.getElementById("gender").value = "";
                document.getElementById("result").innerHTML = "";
                document.getElementById("suggestion").innerHTML = "";
                document.getElementById("meter").value = 0;
    }
    function darkMode(){
                let body = document.getElementById("body");
                document.body.classList.toggle("dark");
    }
     function checkHealth(){
        let weight = Number(document.getElementById("weight").value);
        let height = Number(document.getElementById("height").value);
        let age = Number(document.getElementById("age").value);
        let gender = document.getElementById("gender").value;

        let result = document.getElementById("result");
        let suggestion = document.getElementById("suggestion");
        let meter = document.getElementById("meter");
        if(weight<=0 || height<=0 || age<=0 || gender==""){

        result.innerHTML="Please Enter Valid Details";
        result.style.color="red";
        return;
         }  
          height = height / 100;

        let BMI = weight / (height * height);
        let oldBMI=localStorage.getItem("BMI");

    if(BMI < 18.5){

        result.innerHTML=`BMI : ${BMI.toFixed(2)}<br>🟠 Underweight`;
        result.style.color="orange";

        suggestion.innerHTML="🍎 Eat nutritious food.<br>🥛 Drink milk daily.<br>🏋️ Do strength exercises.";

    }

    else if(BMI < 25){

        result.innerHTML=`BMI : ${BMI.toFixed(2)}<br>🟢 Healthy Weight`;
        result.style.color="green";

        suggestion.innerHTML="✅ Keep exercising.<br>💧 Drink 2-3L water.<br>🥗 Eat a balanced diet.";

    }

    else if(BMI < 30){

        result.innerHTML=`BMI : ${BMI.toFixed(2)}<br>🟡 Overweight`;
        result.style.color="darkorange";

        suggestion.innerHTML="🏃 Walk 30 minutes daily.<br>🥗 Reduce junk food.<br>🚴 Exercise regularly.";

    }

    else{

        result.innerHTML=`BMI : ${BMI.toFixed(2)}<br>🔴 Obese`;
        result.style.color="red";

        suggestion.innerHTML="👨‍⚕️ Consult a doctor.<br>🥦 Follow a healthy diet.<br>🏃 Exercise daily.";

    }
        localStorage.setItem("BMI",BMI.toFixed(2));
}

    </script>

</body>
</html>
